name: st
prefix: ""

mgmt:
  network: st
  ipv4-subnet: 172.80.80.0/24

topology:
  kinds:
    cisco_cat9kv:
      image: tkdebnath/cisco_cat9kv:17.12.01p
      env:
        VCPU: 6
        RAM: 20480
    cisco_c8000v:
      image: tkdebnath/cisco_c8000v:17.16.01a
      env:
        VCPU: 2
        RAM: 6144
    cisco_n9kv:
      image: tkdebnath/cisco_n9kv:9300-10.5.2
      env:
        VCPU: 2
        RAM: 8192

    linux:
      image: ubuntu:latest
      env:
        VCPU: 2
        RAM: 2048

  nodes:
    ### Routers ###
    router1:
      kind: cisco_c8000v
      # startup-config: configs/fabric/router1.cfg
      mgmt-ipv4: 172.80.80.20
      group: router
    ### Core Switches ###
    core1:
      kind: cisco_cat9kv
      group: core
      # startup-config: configs/fabric/spine1.cfg
      mgmt-ipv4: 172.80.80.21

    ### Access Switches ###
    access1:
      kind: cisco_n9kv
      # startup-config: configs/fabric/leaf2.cfg
      mgmt-ipv4: 172.80.80.24
      group: access-switch
    access2:
      kind: cisco_vios
      type: switch
      image: tkdebnath/cisco_vios:L2-20200929
      # startup-config: configs/fabric/leaf3.cfg
      mgmt-ipv4: 172.80.80.25
      group: access-switch

    ### CLIENTS ###
    client1:
      kind: linux
      mgmt-ipv4: 172.80.80.26
      exec:
        - apt-get update && apt-get install -y locales
        - apt install openssh-server -y
        - systemctl enable --now ssh
        - ip address add 172.20.20.2/24 dev eth1
      group: client

  links:
    - endpoints: ["core1:Gi1/0/1", "access1:Ethernet1/1"]
    - endpoints: ["core1:Gi1/0/2", "access2:Gi0"]
    - endpoints: ["access1:Ethernet1/10", "client1:eth1"]
    - endpoints: ["router1:Gi3", "core1:Gi1/0/4"]
